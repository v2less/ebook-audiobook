services:
  audiobook-factory:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
    environment:
      - MIMO_API_KEY=${MIMO_API_KEY:-}
      - CONFIG_PATH=/app/configs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Optional: RTVC service (uncomment if using local voice cloning)
